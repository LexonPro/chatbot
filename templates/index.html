<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Labs Support Chat</title>
    <!-- Use Outfit font for a more modern, premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated background elements -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>
    
    <div class="chat-container glass-effect">
        <div class="chat-header">
            <div class="header-content">
                <div class="bot-profile">
                    <div class="avatar-header">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="header-info">
                        <h2>Pinnacle AI</h2>
                        <div class="status-wrapper">
                            <span class="status-indicator"></span>
                            <p>Online & Ready</p>
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="action-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-content glass-msg">
                    <p>Hello! 👋 I'm the Pinnacle Labs AI assistant.</p>
                    <p>I can help you with data science services, pricing, our 2026 internship program, or just chat! How can I assist you today?</p>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-btn" class="glow-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
